<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>安全数据获取 - 使用 CORS 替代 JSONP</title>
</head>
<body>
  <h1>安全数据获取</h1>
  <p>本页使用 CORS + fetch API 替代 JSONP，避免了 callback 注入风险</p>
  <div id="data-container">加载中...</div>

  <script>
    (async function () {
      try {
        const response = await fetch("/api/data", {
          method: "GET",
          headers: {
            "Accept": "application/json",
          },
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();
        const container = document.getElementById("data-container");

        // 安全地渲染数据
        container.textContent = JSON.stringify(data, null, 2);

        // 如需展示结构化数据，逐一安全创建 DOM 元素
        if (Array.isArray(data)) {
          container.innerHTML = ""; // 清空
          const list = document.createElement("ul");
          data.forEach(function (item) {
            const li = document.createElement("li");
            // 使用 textContent 安全设置文本
            li.textContent = (item.name || "未知") + " - ¥" + (item.price || 0);
            list.appendChild(li);
          });
          container.appendChild(list);
        }
      } catch (error) {
        document.getElementById("data-container").textContent =
          "获取数据失败: " + error.message;
      }
    })();
  </script>
</body>
</html>
